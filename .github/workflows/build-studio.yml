name: Build Skillbox Studio

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "src-tauri/**"
      - "public/**"
      - "package.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - "tailwind.config.*"
      - "pnpm-lock.yaml"
      - "Skill-Box"
      - "Skill-Box/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build-studio:
    name: Build Skillbox Studio (Web)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillbox-studio-dist
          path: "dist/"
          retention-days: 7
